services:
  - type: web
    name: stadiumiq
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: node server/server.js
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        sync: false
      - key: PORT
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
